<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>02 — Forty Times Stamp (paper-texture rebuild)</title>
<!--
  Use: Beat 1A (0:24 — 0:30) right when Taelo says "They cut your background Claude agents by up to forty times. That is not a typo. Forty. Times."
  Style: paper-texture / 2-color / tilt
-->
<style>
  :root {
    --paper: #F1E9D6;
    --paper-shadow: #E2D6BB;
    --ink: #1E2832;
    --ink-soft: #7A8590;
    --red: #C8463C;
    --highlight: #F4E04D;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100vw; height: 100vh; overflow: hidden; background: var(--paper); font-family: "Inter", "Helvetica Neue", Arial, sans-serif; color: var(--ink); }
  body { display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; padding: 4vh 4vw; }

  /* Sandpaper texture */
  body::before {
    content: "";
    position: fixed; inset: -20px;
    pointer-events: none;
    z-index: 1;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 400 400'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.118  0 0 0 0 0.157  0 0 0 0 0.196  0 0 0 0.28 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    opacity: 0.6;
    mix-blend-mode: multiply;
    animation: drift 14s ease-in-out infinite;
  }
  body::after {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 2;
    background: radial-gradient(ellipse at center, transparent 35%, rgba(60, 40, 20, 0.22) 100%);
  }
  @keyframes drift {
    0%, 100% { transform: translate(0, 0); }
    25% { transform: translate(-6px, 3px); }
    50% { transform: translate(3px, -5px); }
    75% { transform: translate(-3px, 6px); }
  }

  .stage { position: relative; z-index: 10; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }

  /* Top-left URL */
  .url { position: absolute; top: 6vh; left: 6vw; font-family: "JetBrains Mono", monospace; font-size: 1.1vw; color: var(--ink-soft); letter-spacing: 0.05em; opacity: 0; transform: translateX(-15px); transition: opacity 0.5s ease-out, transform 0.5s ease-out; }
  .url.show { opacity: 1; transform: translateX(0); }
  .url .hl { color: var(--ink); font-weight: 700; background: rgba(244, 224, 77, 0.5); padding: 0 0.3vw; }
  .url .ar { color: var(--red); margin-left: 0.4vw; }

  /* Top-right date */
  .date-block { position: absolute; top: 6vh; right: 6vw; text-align: right; opacity: 0; transform: translateX(15px); transition: opacity 0.5s ease-out 0.2s, transform 0.5s ease-out 0.2s; }
  .date-block.show { opacity: 1; transform: translateX(0); }
  .date-block .label { font-family: "JetBrains Mono", monospace; font-size: 0.85vw; color: var(--ink-soft); letter-spacing: 0.25em; text-transform: uppercase; }
  .date-block .date { font-family: "JetBrains Mono", monospace; font-size: 2.6vw; font-weight: 800; color: var(--ink); letter-spacing: 0.05em; margin-top: 0.4vh; }
  .date-block .date .red { color: var(--red); }

  /* Main stamp block */
  .stamp-wrap { position: relative; display: flex; flex-direction: column; align-items: center; padding: 6vh 4vw; transform: rotate(-3deg) scale(0.4); opacity: 0; transition: opacity 0.4s cubic-bezier(0.2, 0.7, 0.3, 1.3), transform 0.4s cubic-bezier(0.2, 0.7, 0.3, 1.3); }
  .stamp-wrap.show { opacity: 1; transform: rotate(-3deg) scale(1); }

  .stamp-border { position: absolute; inset: 0; border: 4px dashed var(--red); border-radius: 2vh; }
  .stamp-border::before, .stamp-border::after { content: ""; position: absolute; left: 50%; transform: translateX(-50%); width: 40%; height: 6px; background: var(--paper); }
  .stamp-border::before { top: -3px; }
  .stamp-border::after { bottom: -3px; }

  .big { font-family: "Inter", sans-serif; font-weight: 900; font-size: 24vw; line-height: 0.85; color: var(--red); letter-spacing: -0.04em; text-shadow: 0.4vw 0.4vw 0 rgba(200, 70, 60, 0.15); position: relative; z-index: 2; }
  .big .x { font-size: 16vw; vertical-align: super; margin-left: -0.5vw; }

  .stamp-label { margin-top: 2vh; font-family: "JetBrains Mono", monospace; font-size: 1.5vw; font-weight: 700; color: var(--ink); letter-spacing: 0.3em; text-transform: uppercase; position: relative; z-index: 2; }
  .stamp-label .strike { text-decoration: line-through; text-decoration-color: var(--red); text-decoration-thickness: 3px; color: var(--ink-soft); }

  /* "Not a typo" hand-written caption */
  .typo { position: absolute; bottom: 13vh; left: 50%; transform: translateX(-50%) rotate(-1deg); font-family: "Source Serif Pro", "Georgia", serif; font-style: italic; font-size: 1.8vw; color: var(--ink); opacity: 0; transition: opacity 0.5s ease-out; text-align: center; line-height: 1.3; }
  .typo.show { opacity: 1; }
  .typo .strong { font-weight: 700; color: var(--red); }

  /* Hand-drawn arrow pointing at stamp */
  .arrow-svg { position: absolute; left: 18vw; bottom: 13vh; width: 14vw; height: 14vh; opacity: 0; transition: opacity 0.5s ease-out; }
  .arrow-svg.show { opacity: 1; }
  .arrow-svg svg { width: 100%; height: 100%; stroke: var(--ink); stroke-width: 1.6; fill: none; stroke-linecap: round; stroke-linejoin: round; }

  .arrow-lbl { position: absolute; left: 6vw; bottom: 26vh; font-family: "Source Serif Pro", "Georgia", serif; font-style: italic; font-size: 1.5vw; color: var(--ink); opacity: 0; transition: opacity 0.5s ease-out; transform: rotate(-2deg); }
  .arrow-lbl.show { opacity: 1; }
</style>
</head>
<body data-duration="5000">
<div class="stage">
  <div class="url" id="url">support.claude.com/.../<span class="hl">agent-sdk</span> <span class="ar">→</span></div>

  <div class="date-block" id="date">
    <div class="label">posted</div>
    <div class="date">MAY <span class="red">13</span></div>
  </div>

  <div class="arrow-lbl" id="lbl">est. heavy-use cut<br>(Pocock / canonical-ref)</div>

  <div class="arrow-svg" id="arr">
    <svg viewBox="0 0 200 180">
      <path d="M 10 20 Q 60 50, 80 80 Q 100 110, 150 130"/>
      <path d="M 140 118 L 152 132 L 138 138"/>
    </svg>
  </div>

  <div class="stamp-wrap" id="stamp">
    <div class="stamp-border"></div>
    <div class="big">−40<span class="x">×</span></div>
    <div class="stamp-label"><span class="strike">subsidized</span> · <span style="color:var(--red);">METERED @ API</span></div>
  </div>
</div>

<script>
  function play() {
    document.querySelectorAll('.show').forEach(el => el.classList.remove('show'));
    setTimeout(() => document.getElementById('url').classList.add('show'), 200);
    setTimeout(() => document.getElementById('date').classList.add('show'), 600);
    setTimeout(() => document.getElementById('stamp').classList.add('show'), 1500);
    setTimeout(() => document.getElementById('lbl').classList.add('show'), 2600);
    setTimeout(() => document.getElementById('arr').classList.add('show'), 2900);
  }
  document.addEventListener('DOMContentLoaded', () => setTimeout(play, 500));
  document.addEventListener('keydown', (e) => { if (e.key === 'r' || e.key === 'R') play(); });
</script>
</body>
</html>
